name: Bug report
description: Report a reproducible problem in PerfScope.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove private project paths, tokens, or source snippets before submitting.
  - type: input
    id: version
    attributes:
      label: PerfScope version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code version
      placeholder: "1.xx.x"
    validations:
      required: true
  - type: dropdown
    id: install_source
    attributes:
      label: Install source
      options:
        - Marketplace
        - VSIX
        - Extension Development Host
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Run...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste safe logs or screenshots. Do not include secrets or private source code.
